version: "3.8"

# Wippestoolen NAS Deployment (Portainer Stack)
#
# Deploy via Portainer:
#   1. Stacks → Add stack → Repository
#   2. Repository URL: https://github.com/<user>/Wippestoolen
#   3. Branch: feature/react-native-app
#   4. Compose path: docker-compose.nas.yml
#   5. Add environment variables (see below)
#
# Required environment variables in Portainer:
#   POSTGRES_PASSWORD, SECRET_KEY, CLOUDFLARE_TUNNEL_TOKEN

services:
  db:
    image: postgres:15-alpine
    container_name: wippestoolen_postgres
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: wippestoolen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wippestoolen
    volumes:
      - wippestoolen_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wippestoolen"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wippestoolen_api
    restart: unless-stopped
    ports:
      - "8092:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # App
      ENVIRONMENT: production
      DEBUG: "false"
      SECRET_KEY: ${SECRET_KEY}
      LOG_LEVEL: INFO

      # Database (internal docker network)
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: wippestoolen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: wippestoolen

      # Redis (reuse dsrunde_redis on host, DB 1)
      REDIS_URL: redis://host.docker.internal:6379/1

      # Auth
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 30

      # Photo uploads (local storage)
      PHOTO_STORAGE_DIR: /app/uploads/photos
      PHOTO_BASE_URL: /uploads/photos

      # CORS & Hosts
      ALLOWED_HOSTS: '["api.wippestoolen.de", "wippestoolen.de", "localhost", "127.0.0.1"]'
      ALLOWED_ORIGINS: '["https://wippestoolen.de", "https://www.wippestoolen.de", "http://localhost:3000"]'

      # Rate limiting
      RATE_LIMIT_ENABLED: "true"

      # Migrations
      RUN_MIGRATIONS: "true"
    volumes:
      - wippestoolen_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: wippestoolen_cloudflared
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  wippestoolen_pgdata:
    driver: local
  wippestoolen_uploads:
    driver: local
